    <header class="encabezado">
        <h2 class="logotex"> Travel Dreams 🛫 </h2>
        <div class="linknave">
            <ul class="listnave">
                <li class="naveitem">
                    <a class="linknave" href="./index.html"> Home </a>

                </li>

            <div class="nav-actions">
                        <!-- este actua como el boton de hamburguesa -->

                            <span></span>
                            <span></span>
                            <span></span>
                         </label>
                     </div>
        </div>
    </header>
    <main>
        <section class="reserva">
            <h2 class="titulo"> Reserva tu viaje soñado </h2>
            <form class="formulario" action="procesar_reserva.php" method="POST">
                <div class="campo">
                    <label for="documento">Numero de documento:</label>
                    <input type="text" id="documento" name="documento" required>
                </div>
                <div class="campo">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="campo">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="campo">
                    <label for="destino">Destino:</label>
                    <select id="destino" name="destino" required>
                        <option value="">Selecciona un destino</option>
                        <option value="paris">París</option>
                        <option value="maldivas">Maldivas</option>
                        <option value="tokio">Tokio</option>
                        <option value="nueva_york">Nueva York</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="fecha">Fecha de Viaje:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
                <button type="submit" class="boton-reserva"> Reservar Ahora </button>
            </form>
        </section>
    </main>
</body>
</html>
